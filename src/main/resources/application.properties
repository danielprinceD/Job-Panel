spring.application.name=demo
spring.h2.console.enabled=true

# Datasource configuration for H2 in-memory database
#spring.datasource.url=jdbc:h2:mem:test
#spring.datasource.username=root

# Datasource configuration for PostgreSQL
spring.datasource.url=jdbc:postgresql://localhost:5432/demo
spring.datasource.username=postgres
spring.jpa.database=POSTGRESQL
spring.jpa.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# JPA and Hibernate configuration
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.hibernate.ddl-auto=update


# File upload configuration
spring.servlet.multipart.max-file-size=100MB
spring.servlet.multipart.max-request-size=100MB

# Security configuration
spring.security.user.name=123
spring.security.user.password=123
spring.security.jwt.secret=hC0MjDKz5OSyj8CgSq60OAorzkPr3V9hl3EdEerxAWfWM19n7hMuhsFkCrtFRGKudd2EQ4pIN0vhBx9JvPDdib
spring.security.jwt.expiration=3600000


# Actuator configuration
management.endpoints.web.exposure.include=*
management.endpoint.health.show-details=always
management.endpoint.shutdown.enabled=true
management.info.env.enabled=true
info.app.name=Demo Application
info.app.version=1.0.0
info.app.description=This is a demo application for Spring Boot.

